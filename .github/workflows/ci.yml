name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn typecheck
      - run: yarn test
      - run: yarn build
      - run: yarn verify:dist
      - name: Pack and install the public artifact
        shell: bash
        run: |
          pack_dir="$(mktemp -d)"
          install_prefix="$(mktemp -d)"
          npm pack --json --pack-destination "$pack_dir" > "$pack_dir/pack.json"
          tarball="$(node -e "const p=require(process.argv[1]); process.stdout.write(p[0].filename)" "$pack_dir/pack.json")"
          npm install --global --prefix "$install_prefix" "$pack_dir/$tarball"
          "$install_prefix/bin/autopilot" --version
          "$install_prefix/bin/autopilot" --help
