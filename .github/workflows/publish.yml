name: Publish

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Publish channel
        required: true
        type: choice
        options: [canary]
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn test
      - run: yarn build
      - run: yarn verify:dist
      - name: Prepare canary version
        if: github.event_name == 'workflow_dispatch'
        run: npm version "0.1.0-canary.${GITHUB_RUN_NUMBER}.${GITHUB_SHA::8}" --no-git-tag-version
      - name: Verify release tag
        if: github.event_name == 'release'
        run: |
          version="$(node -p "require('./package.json').version")"
          test "v$version" = "${GITHUB_REF_NAME}"
      - name: Publish canary
        if: github.event_name == 'workflow_dispatch'
        run: npm publish --tag canary --provenance
      - name: Publish stable
        if: github.event_name == 'release'
        run: npm publish --provenance
